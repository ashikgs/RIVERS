{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #176bbf;
            font-family: 'Segoe UI', sans-serif;
           
        }
        .login-card {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background-color: #17bb50;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            font-family: MS Mincho;
            
        }
        .login-card h2 {
            margin-bottom: 25px;
            text-align: center;
            color: #343a40;
        }
        .btn-primary {
            width: 100%;
        }
        .signup-link {
            text-align: center;
            margin-top: 15px;
        }
      
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email address" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>

        <div class="signup-link">
            <p style="color: rgb(43, 226, 180);">Don't have an account? <a href="{% url 'signup' %}">Signup</a></p>
        </div>
       
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-danger mt-2">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    </form>
</div>

</body>
</html>
