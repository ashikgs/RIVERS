<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking</title>
       
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function calculateAmount(event) {
            event.preventDefault(); // Prevent form submission

            const checkin = new Date(document.getElementById("checkin").value);
            const checkout = new Date(document.getElementById("checkout").value);
            const roomType = document.getElementById("room_type").value;

            if (checkout <= checkin) {
                alert("Check-out date must be after check-in date.");
                return;
            }

            // Calculate number of nights
            const diffTime = Math.abs(checkout - checkin);
            const nights = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // Room pricing
            let pricePerNight = 0;
            if (roomType === "single") pricePerNight = 1000;
            else if (roomType === "double") pricePerNight = 1800;
            else if (roomType === "suite") pricePerNight = 3000;

            const total = nights * pricePerNight;

            // Show total in alert and then submit form if confirmed
            if (confirm(`Total amount for ${nights} night(s): ₹${total}\n\nClick OK to confirm booking.`)) {
                document.getElementById("bookingForm").submit();
            }
        }
    </script>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg rounded-4 border-0">
        <div class="card-header bg-primary text-white text-center rounded-top-4">
          <h4 class="mb-0">Hotel Booking Form</h4>
        </div>
        <div class="card-body p-4">
          <form method="post" action="{% url 'booking' %}">
            {% csrf_token %}
             <div class="mb-3">
              <label for="fullName" class="form-label">Hotel Name:</label>
              
               <input type="text" class="form-control"  name="hotel_name" value="{{ hotel.name }}">
            </div>
 
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name:</label>
              <input type="text" class="form-control" id="fullName" name="full_name" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email Address:</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
              <label for="checkIn" class="form-label">Check-in Date:</label>
              <input type="date" class="form-control" id="checkIn" name="check_in" required>
            </div>

            <div class="mb-3">
              <label for="checkOut" class="form-label">Check-out Date:</label>
              <input type="date" class="form-control" id="checkOut" name="check_out" required>
            </div>

            <div class="mb-3">
              <label for="guests" class="form-label">Number of Guests:</label>
              <input type="number" class="form-control" id="guests" name="guests" min="1" required>
            </div>

            <div class="mb-3">
              <label for="roomType" class="form-label">Room Type:</label>
              <select class="form-select" id="roomType" name="room_type" required>
                <option value="">-- Select Room Type --</option>
                <option value="Single">Single</option>
                <option value="Double">Double</option>
                <option value="Suite">Suite</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Payment Method:</label><br>
              <div class="form-check form-check-inline">
                
                <input class="form-check-input" type="radio" name="payment_method" id="gpay" value="GPay" required>
                <label class="form-check-label" for="gpay">Google Pay (GPay)</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="payment_method" id="cash" value="Cash" required>
                <label class="form-check-label" for="cash">Cash on Arrival</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="payment_method" id="card" value="Card" required>
                <label class="form-check-label" for="card">Card Payment</label>
              </div>
            </div>

            <!-- Card Payment Fields -->
            <div id="cardDetails" style="display: none;">
              <div class="mb-3">
                <label for="cardNumber" class="form-label">Card Number:</label>
                <input type="text" class="form-control" id="cardNumber" name="card_number" maxlength="16" pattern="\d{16}" placeholder="1234 5678 9012 3456">
              </div>

              <div class="mb-3 row">
                <div class="col-md-6">
                  <label for="expiry" class="form-label">Expiry Date:</label>
                  <input type="month" class="form-control" id="expiry" name="expiry">
                </div>
                <div class="col-md-6">
                  <label for="cvv" class="form-label">CVV:</label>
                  <input type="password" class="form-control" id="cvv" name="cvv" maxlength="4" pattern="\d{3,4}" placeholder="123">
                </div>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-block">Book Now</button>
              <form method="post" action="{% url 'booking' %}">

            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript to handle payment toggle -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const paymentRadios = document.querySelectorAll('input[name="payment_method"]');
    const cardDetails = document.getElementById("cardDetails");

    function toggleCardDetails(show) {
      cardDetails.style.display = show ? "block" : "none";
    }

    paymentRadios.forEach(radio => {
      radio.addEventListener("change", () => {
        toggleCardDetails(radio.value === "Card");
      });
    });
  });
</script>
